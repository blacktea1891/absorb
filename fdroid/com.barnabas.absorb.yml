# DRAFT F-Droid metadata for the official fdroiddata repo.
# Copy to fdroiddata/metadata/com.barnabas.absorb.yml when opening the merge request.
#
# The load-bearing custom bits (verified against this repo) are the `fdroid`
# flavor selection and the prebuild steps that strip the Chromecast plugin so
# the APK links no Google Play Services. The Flutter SDK plumbing (srclibs /
# buildserver image) should be matched to fdroiddata's CURRENT convention for
# Flutter apps — copy the `srclibs`/`sudo` lines from a recently-merged Flutter
# app in fdroiddata rather than trusting a pinned version here.

Categories:
  - Multimedia
License: GPL-3.0-or-later
AuthorName: Nathan Poulson
SourceCode: https://github.com/pounat/absorb
IssueTracker: https://github.com/pounat/absorb/issues

AutoName: Absorb
Description: |-
  An open-source client for Audiobookshelf servers. Stream and download your
  audiobooks and podcasts, with chapter navigation, sleep timer, equalizer,
  Android Auto, and home-screen widgets.

  Note: the F-Droid build omits Chromecast and the Wear OS companion login
  bridge, which both require proprietary Google Play Services.

RepoType: git
Repo: https://github.com/pounat/absorb.git

Builds:
  - versionName: 1.8.91
    versionCode: 159
    commit: v1.8.91          # tag the release commit; update per submission
    subdir: android/app
    # --- Flutter SDK: match fdroiddata's current Flutter convention ---
    # e.g. srclibs: [flutter@<tag>] plus the flutter precommand in `prebuild`,
    # or the buildserver's bundled flutter. Left intentionally unset here.
    gradle:
      - fdroid
    rm:
      - lib/services/chromecast_service.dart
      - lib/widgets/chromecast_button.dart
    prebuild:
      # Swap the GMS-free stubs into the real filenames.
      - mv lib/services/chromecast_service_stub.dart lib/services/chromecast_service.dart
      - mv lib/widgets/chromecast_button_stub.dart lib/widgets/chromecast_button.dart
      # Drop the Chromecast plugin so its play-services-cast AAR is never pulled.
      # Keep pubspec.lock: pub get drops just flutter_chrome_cast (and its
      # orphaned cast deps) while every other version stays pinned. Deleting
      # the lock forces a full re-resolve that drifts e.g. flutter_carplay to
      # an API-incompatible version and breaks the build.
      - sed -i '/flutter_chrome_cast:/d' pubspec.yaml
      - flutter pub get
    output: build/app/outputs/flutter-apk/app-fdroid-release.apk

# F-Droid signs with its own key (no reproducible-build setup yet), so F-Droid
# installs are independent of the GitHub-flavor APK signature.
AutoUpdateMode: Version
UpdateCheckMode: Tags
CurrentVersion: 1.8.91
CurrentVersionCode: 159
