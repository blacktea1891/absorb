name: Build Android APK

# 允许我们在 GitHub 网页端手动点击按钮触发编译
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest # 使用最新的 Ubuntu 云端服务器

    steps:
      # 1. 拉取你的最新代码（包含你翻译好的 app_zh.arb）
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 在云端配置 Flutter 环境
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable' # 使用稳定版 Flutter

      # 3. 下载项目依赖
      - name: Install dependencies
        run: flutter pub get

      # 4. 生成多语言 Dart 代码（最关键的一步，让你的翻译生效！）
      - name: Generate localization files
        run: flutter gen-l10n

      # 5. 编译 Android APK 安装包
      - name: Build APK
        run: flutter build apk --debug

      # 6. 将编译好的 APK 上传，供你下载
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Absorb-Chinese-Preview-APK
          path: build/app/outputs/flutter-apk/app-debug.apk
